<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #121212;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .icon { font-size: 48px; }
    h1 { font-size: 22px; color: #e91429; }
    p { color: #b3b3b3; font-size: 14px; max-width: 380px; line-height: 1.6; }
    code { background: #242424; padding: 2px 8px; border-radius: 4px; font-size: 13px; color: #1DB954; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h1>Could not start backend</h1>
  <p>Make sure Python 3.11 and the dependencies are installed:</p>
  <p><code>pip3.11 install -r backend/requirements.txt</code></p>
  <p style="margin-top:8px">Then restart the app.</p>
</body>
</html>
