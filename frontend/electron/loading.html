<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #121212;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1DB954;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29,185,84,0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(29,185,84,0); }
    }
    h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
    p { color: #b3b3b3; font-size: 14px; }
    .dots { display: flex; gap: 8px; margin-top: 8px; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1DB954;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo">♫</div>
  <h1>OfflineBeats</h1>
  <p>Starting up…</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
